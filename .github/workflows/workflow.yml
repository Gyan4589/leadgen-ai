# Publish LeadGen AI to PyPI via Trusted Publishing (OIDC)
# Developed by Gyan Ranjan
#
# PyPI Trusted Publisher form fields for this workflow:
#   Owner:            Gyan4589
#   Repository name:  leadgen-ai
#   Workflow name:    workflow.yml
#   Environment name: pypi
#
# Triggers: GitHub Release published, or manual "Run workflow"

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/leadgen-ai
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
      contents: read
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
